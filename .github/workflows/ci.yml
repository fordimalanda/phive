name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Code Verification (Compile)
        run: npm run compile

      - name: Test Package Generation
        run: npx @vscode/vsce package

      # Extrait le fichier .vsix généré pour le rendre téléchargeable
      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: phive-extension-package # Nom du dossier d'artefact sur GitHub
          path: "*.vsix"                # Récupère automatiquement tout fichier .vsix (respecte la version)
          if-no-files-found: error